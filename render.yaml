services:
  - type: web
    name: vionest-api
    env: node
    plan: starter
    buildCommand: npm install && npm rebuild sqlite3 --build-from-source
    startCommand: npm run start
    disk:
      name: vionest-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: npm_config_build_from_source
        value: "true"
      - key: DATABASE_PATH
        value: /var/data/vionest.sqlite
      - key: FRONTEND_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
