services:
  - type: web
    name: vionest-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run start
    disk:
      name: vionest-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20.17.0
      - key: DATABASE_PATH
        value: /var/data/vionest.sqlite
      - key: FRONTEND_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
